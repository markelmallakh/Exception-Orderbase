<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media Center — Exception</title>
    <meta
      name="description"
      content="Stories, recipes and news from Exception — behind our signature sweets, celebration tips and moments worth sharing."
    />
    <!-- Tailwind (Play CDN) + faithful port of the project's tailwind.config.ts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tw-config.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script defer src="scripts.js"></script>
  </head>
  <body data-page="blogs" data-path="/blogs" class="antialiased bg-white">
    <!-- Shared header is injected here by scripts.js -->
    <div id="site-header"></div>

    <main class="overflow-x-hidden">
      <section>
        <!-- ============================ BLOG HEADER ============================ -->
        <div class="bg-white">
          <div class="container px-4 flex flex-col items-center justify-center py-10">
            <nav aria-label="Breadcrumb" class="flex items-center gap-2 text-sm text-gray-700 justify-center mb-4">
              <a href="index.html" class="hover:text-primaryDark transition-colors">Home</a>
              <span class="text-gray-400">/</span>
              <span class="text-primaryDark font-medium">Media Center</span>
            </nav>
            <span class="eyebrow mb-2">Media Center</span>
            <h1 class="text-primaryDark text-4xl md:text-5xl font-bold mb-8 text-center">Moments Worth Sharing</h1>
          </div>
        </div>

        <div class="container px-4">
          <section class="md:py-14">
            <!-- Optional category filter (client-side; filters the grid below) -->
            <div class="segmented-scroll no-scrollbar mb-8 md:mb-12" data-blog-filter>
  <div class="segmented text-sm font-medium" data-segmented role="tablist">
    <span class="segmented__thumb" aria-hidden="true"></span>
    <button type="button" class="blog-filter-btn is-active px-5 py-1.5 text-sm font-medium" data-filter="all">All</button>
    <button type="button" class="blog-filter-btn px-5 py-1.5 text-sm font-medium" data-filter="blog">Blog</button>
    <button type="button" class="blog-filter-btn px-5 py-1.5 text-sm font-medium" data-filter="news">News</button>
    <button type="button" class="blog-filter-btn px-5 py-1.5 text-sm font-medium" data-filter="event">Event</button>
  </div>
</div>

            <!-- ============================ BLOG GRID ============================ -->
            <!-- Post cards → the same global component the homepage uses -->
            <div data-posts data-blog-grid class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3"></div>

            <!-- Static pagination (mirrors Pagination.tsx) -->
            <div class="flex justify-center mt-10 md:mt-14">
              <button type="button" disabled class="px-4 py-2 mx-1 rounded bg-gray-200 text-gray-700 disabled:opacity-50">Previous</button>
              <button type="button" class="px-4 py-2 mx-1 rounded bg-primaryColor text-white">1</button>
              <button type="button" class="px-4 py-2 mx-1 rounded bg-gray-200 text-gray-700">2</button>
              <button type="button" class="px-4 py-2 mx-1 rounded bg-gray-200 text-gray-700">3</button>
              <button type="button" class="px-4 py-2 mx-1 rounded bg-gray-200 text-gray-700">Next</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <!-- Shared footer is injected here by scripts.js -->
    <div id="site-footer"></div>

    <!-- Client-side category filter for the blog grid -->
    <script>
      (function () {
        const wrap = document.querySelector("[data-blog-filter]");
        const grid = document.querySelector("[data-blog-grid]");
        if (!wrap || !grid) return;
        wrap.addEventListener("click", (e) => {
          const btn = e.target.closest(".blog-filter-btn");
          if (!btn) return;
          wrap.querySelectorAll(".blog-filter-btn").forEach((b) => b.classList.remove("is-active"));
          btn.classList.add("is-active");
          const f = btn.getAttribute("data-filter");
          grid.querySelectorAll("[data-category]").forEach((item) => {
            item.hidden = !(f === "all" || item.getAttribute("data-category") === f);
          });
        });
      })();
    </script>
  </body>
</html>
