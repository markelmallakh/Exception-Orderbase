<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Make Your Cake — Exception</title>
    <meta
      name="description"
      content="Play cake designer — build your own Exception cake live on a pedestal: shape, size, flavour, filling and decoration, updated as you go."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tw-config.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script defer src="scripts.js"></script>
  </head>
  <body data-page="make-your-cake" data-path="/shop/make-your-cake" class="antialiased bg-white">
    <div id="site-header"></div>

    <main class="overflow-x-hidden">
      <!-- ============================ HERO ============================ -->
      <section class="bg-gray-100 pt-8 lg:pt-12 pb-6">
        <div class="container">
          <nav aria-label="Breadcrumb" class="flex items-center gap-2 text-sm text-gray-700 mb-5">
            <a href="index.html" class="hover:text-primaryDark transition-colors">Home</a>
            <span class="text-gray-400">/</span>
            <span class="text-primaryDark font-medium">Make Your Cake</span>
          </nav>
          <div class="flex flex-col items-center gap-3 text-center max-w-[640px] mx-auto">
            <span class="eyebrow">Make Your Cake</span>
            <h1 class="text-[30px] lg:text-[46px] font-semibold leading-[115%] text-textSecondary">Play Cake <span class="text-primary">Designer</span></h1>
            <p class="text-sm lg:text-base text-gray-700 leading-[150%]">Build your cake live — tap around the tabs and watch it come together on the stand. When it's perfect, add it to your cart.</p>
          </div>
        </div>
      </section>

      <!-- ============================ BUILDER ============================ -->
      <section class="bg-gray-100 pb-16 lg:pb-24">
        <div class="container">
          <div class="mx-auto max-w-[1040px] grid gap-6 lg:grid-cols-2 lg:items-stretch" data-cake-builder>
            <!-- Live cake on a pedestal -->
            <div class="relative overflow-hidden rounded-[24px] border border-gray-200 bg-gradient-to-b from-white to-primary-light/40 shadow-custom4 p-6 flex flex-col items-center justify-center">
              <div class="cake-stage w-full" style="min-height:360px">
                <div class="cake-glow"></div>
                <div class="cake-drop">
                  <div class="cake3d is-round" id="liveCake" style="--w:clamp(160px,40vw,230px)">
                    <div class="cake3d__obj">
                      <span class="cake3d__topper" data-live-topper></span>
                      <div class="cake3d__top"></div>
                      <div class="cake3d__body"></div>
                    </div>
                  </div>
                </div>
                <div class="pedestal">
                  <div class="pedestal__plate"></div>
                  <div class="pedestal__stem"></div>
                  <div class="pedestal__foot"></div>
                </div>
              </div>
              <p class="mt-7 text-sm font-semibold text-textSecondary text-center" data-cake-summary></p>
            </div>

            <!-- Config: tabs + options -->
            <div class="flex flex-col overflow-hidden rounded-[24px] border border-gray-200 bg-white shadow-custom4">
              <div class="flex items-center gap-5 overflow-x-auto border-b border-gray-200 px-5 md:px-6" data-cake-tabs></div>
              <div class="flex-1 px-5 md:px-6 py-6" data-cake-panel></div>
              <div class="flex items-center gap-3 border-t border-gray-200 px-5 md:px-6 py-4">
                <button type="button" class="btn btn--secondary btn--md whitespace-nowrap" data-surprise>🎲 Surprise Me</button>
                <button type="button" class="btn btn--primary btn--md flex-1 justify-center" data-add>Add to Cart</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script>
      (function () {
        const builder = document.querySelector("[data-cake-builder]");
        if (!builder) return;
        const tabsEl = builder.querySelector("[data-cake-tabs]");
        const panelEl = builder.querySelector("[data-cake-panel]");
        const summaryEl = builder.querySelector("[data-cake-summary]");
        const liveCake = document.getElementById("liveCake");
        const liveTopper = liveCake.querySelector("[data-live-topper]");
        const addBtn = builder.querySelector("[data-add]");
        const surpriseBtn = builder.querySelector("[data-surprise]");

        // ---- Cake config maps (see .cake3d in styles.css) ----
        const CAKE_BASE = { shape: "circle", sponge: "#efd9b4", frost: "#fff6ea", fill: "#c9a66b", drip: "transparent", topper: "", scale: 1 };
        const SHAPE_CLASS = { rectangle: "is-rect", square: "is-square", circle: "is-round" };
        const FLAV = {
          chocolate: { sponge: "#5c3a24", frost: "#6f4a2f" },
          vanilla: { sponge: "#efd9b4", frost: "#fff6ea" },
          half: { sponge: "#efd9b4", frost: "#6f4a2f" },
        };
        const FILLC = { nuts: "#c9a66b", fruit: "#e26d8a", lotus: "#b06b3a", nutella: "#5a3a22" };
        const DECO = { classic: {}, fruits: { topper: "🍓" }, chocolate: { drip: "#4a2e1a" }, themed: { topper: "⭐" } };
        const SIZE_SCALE = { "30x40": 0.72, "40x60": 0.86, "60x80": 1, "80x120": 1.18 };

        const TABS = [
          { key: "shape", label: "Shape", title: "What shape would you like?", options: [
            { id: "rectangle", name: "Rectangle" }, { id: "square", name: "Square" }, { id: "circle", name: "Round" } ] },
          { key: "size", label: "Size", title: "How big should it be?", options: [
            { id: "30x40", name: "30 × 40", sub: "Serves ~20" }, { id: "40x60", name: "40 × 60", sub: "Serves ~30" },
            { id: "60x80", name: "60 × 80", sub: "Serves ~40" }, { id: "80x120", name: "80 × 120", sub: "Serves ~45" } ] },
          { key: "flavour", label: "Flavour", title: "Pick your sponge flavour", options: [
            { id: "chocolate", name: "Chocolate" }, { id: "vanilla", name: "Vanilla" }, { id: "half", name: "Half & Half" } ] },
          { key: "filling", label: "Filling", title: "Choose a filling", options: [
            { id: "nuts", name: "Classic Nuts" }, { id: "fruit", name: "Fresh Fruit" }, { id: "lotus", name: "Lotus" }, { id: "nutella", name: "Nutella" } ] },
          { key: "decoration", label: "Decoration", title: "How should we decorate it?", options: [
            { id: "classic", name: "Classic Cream" }, { id: "fruits", name: "Fruit Topping" }, { id: "chocolate", name: "Chocolate Drip" }, { id: "themed", name: "Themed Topper" } ] },
          { key: "message", label: "Message", title: "Add a message on the cake", type: "text",
            placeholder: "e.g. Happy Birthday Mariam", note: "Writing on the cake adds 30 EGP — leave it blank to skip." },
        ];

        // Pre-seeded so the cake always looks complete; `touched` tracks real picks.
        const state = { shape: "circle", size: "40x60", flavour: "vanilla", filling: "nuts", decoration: "classic", message: "" };
        const touched = {};
        let tab = 0;

        function cakeVisual(cfg, w) {
          const c = Object.assign({}, CAKE_BASE, cfg);
          const cls = SHAPE_CLASS[c.shape] || "is-round";
          const style =
            "--w:" + (w || 84) + "px;--scale:" + (c.scale || 1) + ";--sponge:" + c.sponge +
            ";--frost:" + c.frost + ";--fill:" + c.fill + ";--drip:" + (c.drip || "transparent") + ";";
          return (
            '<div class="cake3d ' + cls + '" style="' + style + '"><div class="cake3d__obj">' +
            (c.topper ? '<span class="cake3d__topper">' + c.topper + "</span>" : "") +
            '<div class="cake3d__top"></div><div class="cake3d__body"></div></div></div>'
          );
        }
        function cakeFor(key, id) {
          if (key === "shape") return { shape: id };
          if (key === "size") return { scale: SIZE_SCALE[id] || 1 };
          if (key === "flavour") return FLAV[id] || {};
          if (key === "filling") return { fill: FILLC[id] || CAKE_BASE.fill };
          if (key === "decoration") return DECO[id] || {};
          return {};
        }
        function composed() {
          const cfg = Object.assign({}, CAKE_BASE);
          cfg.shape = state.shape;
          Object.assign(cfg, FLAV[state.flavour] || {});
          cfg.fill = FILLC[state.filling] || CAKE_BASE.fill;
          Object.assign(cfg, DECO[state.decoration] || {});
          cfg.scale = Math.min(1.15, (SIZE_SCALE[state.size] || 1) + 0.08);
          return cfg;
        }
        function nameFor(key) {
          const t = TABS.find((x) => x.key === key);
          const o = t && t.options && t.options.find((x) => x.id === state[key]);
          return o ? o.name : "";
        }

        function updateCake(pop) {
          const c = composed();
          liveCake.className = "cake3d " + (SHAPE_CLASS[c.shape] || "is-round");
          liveCake.style.setProperty("--sponge", c.sponge);
          liveCake.style.setProperty("--frost", c.frost);
          liveCake.style.setProperty("--fill", c.fill);
          liveCake.style.setProperty("--drip", c.drip || "transparent");
          liveCake.style.setProperty("--scale", c.scale);
          if (c.topper) {
            liveTopper.textContent = c.topper;
            liveTopper.classList.remove("drop");
            void liveTopper.offsetWidth;
            liveTopper.classList.add("drop");
          } else {
            liveTopper.textContent = "";
          }
          if (pop) {
            liveCake.classList.remove("is-pop");
            void liveCake.offsetWidth;
            liveCake.classList.add("is-pop");
          }
          summaryEl.textContent = [nameFor("shape"), nameFor("flavour"), nameFor("filling")].filter(Boolean).join("  ·  ");
        }

        function renderTabs() {
          tabsEl.innerHTML = TABS.map((t, i) =>
            '<button type="button" class="cake-tab' + (i === tab ? " is-active" : "") + '" data-tab="' + i + '">' +
            t.label + (touched[t.key] ? '<span class="cake-tab__check">✓</span>' : "") + "</button>"
          ).join("");
        }
        function renderPanel() {
          const t = TABS[tab];
          let inner = '<h2 class="text-lg md:text-xl font-semibold text-textSecondary mb-5">' + t.title + "</h2>";
          if (t.type === "text") {
            inner +=
              '<input type="text" data-cake-text maxlength="40" placeholder="' + t.placeholder + '" value="' + (state.message || "") +
              '" class="h-12 w-full rounded-lg border border-customGrayMedium focus:border-primary px-4 text-sm text-textSecondary outline-none transition-colors" />' +
              '<p class="text-xs text-gray-500 mt-2">' + t.note + "</p>";
          } else {
            inner +=
              '<div class="grid grid-cols-2 gap-3 sm:grid-cols-3">' +
              t.options.map((o) =>
                '<button type="button" class="myc-opt' + (state[t.key] === o.id ? " is-active" : "") + '" data-opt="' + o.id + '">' +
                '<span class="grid place-items-center h-[86px]">' + cakeVisual(cakeFor(t.key, o.id), 78) + "</span>" +
                '<span class="font-semibold text-sm text-textSecondary">' + o.name + "</span>" +
                (o.sub ? '<span class="text-xs text-gray-500">' + o.sub + "</span>" : "") +
                "</button>"
              ).join("") +
              "</div>";
          }
          panelEl.innerHTML = '<div class="cake-panel">' + inner + "</div>";
        }

        tabsEl.addEventListener("click", (e) => {
          const b = e.target.closest("[data-tab]");
          if (!b) return;
          tab = +b.getAttribute("data-tab");
          renderTabs();
          renderPanel();
        });
        panelEl.addEventListener("click", (e) => {
          const opt = e.target.closest("[data-opt]");
          if (!opt) return;
          const key = TABS[tab].key;
          state[key] = opt.getAttribute("data-opt");
          touched[key] = true;
          panelEl.querySelectorAll(".myc-opt").forEach((x) => x.classList.toggle("is-active", x === opt));
          renderTabs();
          updateCake(true);
        });
        panelEl.addEventListener("input", (e) => {
          const t = e.target.closest("[data-cake-text]");
          if (t) { state.message = t.value; touched.message = true; renderTabs(); }
        });

        surpriseBtn.addEventListener("click", () => {
          TABS.forEach((t) => {
            if (t.type === "text") return;
            const pick = t.options[Math.floor(seededRand() * t.options.length)];
            state[t.key] = pick.id;
            touched[t.key] = true;
          });
          renderTabs();
          renderPanel();
          updateCake(true);
        });
        // tiny deterministic-ish shuffle without Math.random dependency issues
        let seed = 7;
        function seededRand() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }

        addBtn.addEventListener("click", () => {
          document.querySelectorAll("[data-cart-count]").forEach((b) => {
            b.textContent = (parseInt(b.textContent, 10) || 0) + 1;
            const cart = b.closest("[data-open='cart'], [data-floating-cart]");
            if (cart) { cart.classList.add("cart-bump"); setTimeout(() => cart.classList.remove("cart-bump"), 500); }
          });
          addBtn.textContent = "Added to Cart ✓";
          addBtn.classList.add("pointer-events-none", "opacity-70");
          setTimeout(() => {
            addBtn.textContent = "Add to Cart";
            addBtn.classList.remove("pointer-events-none", "opacity-70");
          }, 1800);
        });

        renderTabs();
        renderPanel();
        updateCake(false);
      })();
    </script>
  </body>
</html>
