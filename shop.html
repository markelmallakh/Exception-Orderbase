<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shop — Exception</title>
    <meta
      name="description"
      content="Browse the full Exception collection — cakes, oriental sweets, chocolate and gift boxes. Same-day delivery across Egypt."
    />
    <!-- Tailwind (Play CDN) + faithful port of the project's tailwind.config.ts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tw-config.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script defer src="scripts.js"></script>
  </head>
  <body data-page="shop" data-path="/shop" class="antialiased bg-white">
    <!-- Shared header is injected here by scripts.js -->
    <div id="site-header"></div>

    <main class="overflow-x-hidden">
      <!-- ============================ SHOP HERO + CATEGORIES ============================
           Source: /shop = ShoppingProvider > ShoppingController (sort + product grid, no banner).
           A heading + category cards grid is added here as the shop landing entry point. -->
      <section class="relative flex flex-col justify-center items-start py-8 md:py-12 px-4 md:px-8 lg:px-16 gap-6 md:gap-10 bg-gradient-to-b from-lightBlue to-neutral-cream z-[3]">
        <div class="w-full flex flex-col items-center justify-center gap-2">
          <div class="flex flex-col justify-center items-center gap-2 w-full">
            <span class="font-Caveat font-semibold text-[24px] sm:text-[28px] md:text-[32px] leading-[40px] text-center text-accent-600 italic tracking-[-0.005em] w-full">Explore our world of flavour</span>
            <h1 class="font-semibold text-[32px] sm:text-[40px] md:text-[48px] leading-[120%] text-center text-textSecondary w-full text-balance max-w-[702px] mx-auto">Shop the Full Collection</h1>
          </div>
          <div class="mt-4 md:mt-8 w-full max-w-[1392px] mx-auto">
            <div class="flex flex-row items-center w-full py-[17px] gap-[9px] overflow-x-auto no-scrollbar justify-start sm:justify-between sm:gap-6 md:gap-[58px] sm:overflow-visible">
              <a href="shop-category.html" class="flex flex-col justify-between items-center gap-[12.8px] sm:gap-4 w-[160px] flex-none sm:flex-1 sm:min-w-0 sm:max-w-[200px] group">
                <div class="mx-auto w-full aspect-square overflow-hidden rounded-full"><img src="dummy-images/image-2.webp" alt="Cakes" class="object-cover w-full h-full group-hover:scale-110 transition-all duration-300" /></div>
                <span class="font-semibold text-[14.4px] sm:text-[17px] md:text-[18px] leading-[140%] text-textSecondary text-center whitespace-nowrap">Cakes</span>
              </a>
              <a href="shop-category.html" class="flex flex-col justify-between items-center gap-[12.8px] sm:gap-4 w-[160px] flex-none sm:flex-1 sm:min-w-0 sm:max-w-[200px] group">
                <div class="mx-auto w-full aspect-square overflow-hidden rounded-full"><img src="dummy-images/image-7.webp" alt="Oriental Sweets" class="object-cover w-full h-full group-hover:scale-110 transition-all duration-300" /></div>
                <span class="font-semibold text-[14.4px] sm:text-[17px] md:text-[18px] leading-[140%] text-textSecondary text-center whitespace-nowrap">Oriental Sweets</span>
              </a>
              <a href="shop-category.html" class="flex flex-col justify-between items-center gap-[12.8px] sm:gap-4 w-[160px] flex-none sm:flex-1 sm:min-w-0 sm:max-w-[200px] group">
                <div class="mx-auto w-full aspect-square overflow-hidden rounded-full"><img src="images/singleproduct.png" alt="Chocolate" class="object-cover w-full h-full group-hover:scale-110 transition-all duration-300" /></div>
                <span class="font-semibold text-[14.4px] sm:text-[17px] md:text-[18px] leading-[140%] text-textSecondary text-center whitespace-nowrap">Chocolate</span>
              </a>
              <a href="shop-category.html" class="flex flex-col justify-between items-center gap-[12.8px] sm:gap-4 w-[160px] flex-none sm:flex-1 sm:min-w-0 sm:max-w-[200px] group">
                <div class="mx-auto w-full aspect-square overflow-hidden rounded-full"><img src="dummy-images/image-8.webp" alt="Gateaux" class="object-cover w-full h-full group-hover:scale-110 transition-all duration-300" /></div>
                <span class="font-semibold text-[14.4px] sm:text-[17px] md:text-[18px] leading-[140%] text-textSecondary text-center whitespace-nowrap">Gateaux</span>
              </a>
              <a href="shop-category.html" class="flex flex-col justify-between items-center gap-[12.8px] sm:gap-4 w-[160px] flex-none sm:flex-1 sm:min-w-0 sm:max-w-[200px] group">
                <div class="mx-auto w-full aspect-square overflow-hidden rounded-full"><img src="dummy-images/image-4.webp" alt="Petit Four" class="object-cover w-full h-full group-hover:scale-110 transition-all duration-300" /></div>
                <span class="font-semibold text-[14.4px] sm:text-[17px] md:text-[18px] leading-[140%] text-textSecondary text-center whitespace-nowrap">Petit Four</span>
              </a>
              <a href="shop-category.html" class="flex flex-col justify-between items-center gap-[12.8px] sm:gap-4 w-[160px] flex-none sm:flex-1 sm:min-w-0 sm:max-w-[200px] group">
                <div class="mx-auto w-full aspect-square overflow-hidden rounded-full"><img src="dummy-images/image-7.webp" alt="Gift Boxes" class="object-cover w-full h-full group-hover:scale-110 transition-all duration-300" /></div>
                <span class="font-semibold text-[14.4px] sm:text-[17px] md:text-[18px] leading-[140%] text-textSecondary text-center whitespace-nowrap">Gift Boxes</span>
              </a>
            </div>
          </div>
        </div>
      </section>

      <!-- ============================ SHOPPING CONTROLLER (sort + product grid) ============================
           Source: ShoppingController > ShoppingFilters (sort only on landing) + ProductsList grid. -->
      <section class="pt-10 md:pt-12 pb-14 md:pb-24">
        <div class="container flex flex-col gap-10">
          <!-- ShoppingFilters: no category options on the landing → justify-end, sort only -->
          <div class="flex flex-col gap-7 md:flex-row md:items-center md:justify-between">
            <div class="flex flex-col gap-1">
              <h2 class="font-semibold text-textSecondary text-xl md:text-2xl">All Products</h2>
              <span class="text-xs md:text-sm text-gray-700"><span data-count>15</span> products</span>
            </div>
            <label class="flex items-center gap-2 md:justify-end">
              <span class="text-xs font-medium text-primaryText md:text-sm shrink-0">Sort by</span>
              <select class="placeholder-select w-full md:w-[210px] border border-neutral-200 rounded-full pl-4 pr-9 h-11 text-sm text-textSecondary capitalize">
                <option value="best_selling">best selling</option>
                <option value="new_arrivals">new arrivals</option>
                <option value="price_asc">price: low to high</option>
                <option value="price_desc">price: high to low</option>
              </select>
            </label>
          </div>

          <!-- ProductsList grid -->
          <div class="grid gap-y-7 gap-x-2.5 md:gap-x-5 md:gap-y-10 grid-cols-2 md:grid-cols-3 xl:grid-cols-5" data-products-grid></div>
        </div>
      </section>
    </main>

    <!-- Shared footer is injected here by scripts.js -->
    <div id="site-footer"></div>

    <!-- Product data → rendered into the grid as canonical product cards -->
    <script>
      (function () {
        const IMGS = [
          "dummy-images/image-7.webp",
          "dummy-images/image-2.webp",
          "images/singleproduct.png",
          "dummy-images/image-8.webp",
          "images/secondmemoryimage.png",
        ];
        // [name, price, sale(0 = none)]
        const PRODUCTS = [
          ["Chocolate Fudge Cake", 650, 0],
          ["Assorted Baklava Box", 480, 420],
          ["Belgian Truffle Selection", 380, 0],
          ["Red Velvet Gateau", 590, 0],
          ["Pistachio Kunafa", 260, 0],
          ["Summer Berry Cheesecake", 540, 0],
          ["Date & Nut Maamoul", 300, 0],
          ["Salted Caramel Tart", 390, 340],
          ["Mango Mousse Cake", 610, 0],
          ["Mini Cupcake Dozen", 280, 0],
          ["Signature Celebration Cake", 720, 0],
          ["Oriental Sweets Platter", 450, 0],
          ["Dark Chocolate Gift Box", 560, 500],
          ["Vanilla Bean Gateau", 560, 0],
          ["Basbousa Tray", 240, 0],
        ];
        function card([name, price, sale], i) {
          const cur = sale ? Math.min(price, sale) : price;
          const old = sale ? Math.max(price, sale) : 0;
          const hasSale = sale && old > cur;
          const intp = Math.floor(cur);
          const dec = (cur - intp).toFixed(2).substring(1);
          return `
          <a href="product.html" class="group/card block relative" aria-label="${name}">
            <div class="relative">
              <div class="rounded-[12px] aspect-square overflow-hidden bg-primary-light">
                <img src="${IMGS[i % IMGS.length]}" alt="${name}" class="w-full h-full object-cover md:group-hover/card:scale-110 transition-all duration-300" />
              </div>
              <span class="absolute end-3 -bottom-5 z-10" data-add-widget data-type="simple">
                <button type="button" data-add-btn aria-label="Add to cart" class="grid place-items-center bg-primary-200 text-primaryDark rounded-[8px] size-[42px] shadow-custom-5 hover:bg-primary-300 transition-colors">
                  <svg viewBox="0 0 24 24" fill="none" class="w-[22px] h-[22px]"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
                </button>
                <span class="hidden items-center gap-0.5 bg-primary-light rounded-[8px] h-[42px] px-2 shadow-custom-5" data-counter>
                  <button type="button" data-dec aria-label="Remove" class="grid place-items-center size-[26px] rounded-[4px] hover:bg-black/5 transition-colors">
                    <img data-dec-icon src="images/icons/trash.svg" alt="" width="18" height="18" />
                  </button>
                  <span data-qty class="w-[34px] text-center text-lg font-medium text-primaryDark tabular-nums">1</span>
                  <button type="button" data-inc aria-label="Add" class="grid place-items-center size-[26px] rounded-[4px] bg-primary-300 text-white hover:bg-primary-400 transition-colors">
                    <svg viewBox="0 0 24 24" fill="none" class="w-4 h-4"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
                  </button>
                </span>
              </span>
            </div>
            <div class="flex flex-col gap-2 pt-6">
              <div class="flex items-end gap-2 flex-wrap">
                <span class="flex items-end gap-0.5 text-cta leading-none" dir="ltr">
                  <span class="text-2xl font-semibold">${intp}</span>
                  <span class="text-lg font-normal">${dec}</span>
                  <span class="text-lg font-normal">EGP</span>
                </span>
                ${hasSale ? `<span class="text-sm text-gray-500 line-through leading-none" dir="ltr">${old}.00EGP</span>` : ""}
              </div>
              <p class="text-primaryDark text-base font-medium leading-[1.4] line-clamp-2 min-h-[2.8em]">${name}</p>
            </div>
          </a>`;
        }
        const grid = document.querySelector("[data-products-grid]");
        if (grid) grid.innerHTML = PRODUCTS.map(card).join("");
        const count = document.querySelector("[data-count]");
        if (count) count.textContent = PRODUCTS.length;
      })();
    </script>
  </body>
</html>
