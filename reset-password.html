<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password — Exception</title>
    <meta
      name="description"
      content="Set a new password for your Exception account and sign back in securely."
    />
    <!-- Tailwind (Play CDN) + faithful port of the project's tailwind.config.ts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tw-config.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script defer src="scripts.js"></script>
  </head>
  <body data-page="reset" data-path="/reset-password" class="antialiased bg-white">
    <!-- Shared header is injected here by scripts.js -->
    <div id="site-header"></div>

    <main class="overflow-x-hidden">
      <!-- ============================ AUTH: RESET PASSWORD ============================ -->
      <!-- Mirrors ResetPassword.tsx / ResetPasswordForm.tsx: new password + confirm, centered card. -->
      <div class="py-6 md:py-12">
        <div class="rounded-[20px] bg-white px-5 py-6 border border-gray-300 md:px-8 mx-auto my-14 w-[90%] md:my-20 md:max-w-[570px]">
          <h1 class="w-full border-b border-primaryLight pb-5 text-center text-2xl font-medium text-primaryDark">Reset Password</h1>
          <p class="mt-6 text-center text-sm text-blackText">Create a new password for your account. Make sure it's at least 8 characters.</p>

          <!-- Demo form: prevented + toasts on submit (see scripts.js data-demo-form) -->
          <form data-demo-form="Password reset — please sign in" data-redirect="login.html" class="m-auto my-10 flex flex-col gap-4">
            <div class="flex flex-col gap-2">
              <label for="newPassword" class="after:ps-1 after:content-['*'] text-gray-700 font-medium">Enter new password</label>
              <div class="relative">
                <input type="password" id="newPassword" name="newPassword" class="h-11 w-full rounded-md border border-primaryText focus:border-primary-400 px-2.5 py-4 font-medium text-gray-700 outline-none transition-colors" />
                <button type="button" data-password-toggle class="absolute end-[13px] top-1/2 -translate-y-1/2 inline-flex text-primaryText" aria-label="Show password">
                  <svg viewBox="0 0 24 24" fill="none" class="w-6 h-6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
                </button>
              </div>
            </div>

            <div class="flex flex-col gap-2">
              <label for="confirmNewPassword" class="after:ps-1 after:content-['*'] text-gray-700 font-medium">Confirm new password</label>
              <div class="relative">
                <input type="password" id="confirmNewPassword" name="confirmNewPassword" class="h-11 w-full rounded-md border border-primaryText focus:border-primary-400 px-2.5 py-4 font-medium text-gray-700 outline-none transition-colors" />
                <button type="button" data-password-toggle class="absolute end-[13px] top-1/2 -translate-y-1/2 inline-flex text-primaryText" aria-label="Show password">
                  <svg viewBox="0 0 24 24" fill="none" class="w-6 h-6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn--black btn--md mt-2 w-full justify-center focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primaryDark">Reset Password</button>
          </form>

          <p class="text-center text-sm text-primaryText">
            <a href="login.html" class="pb-0.5 border-primaryColor border-b font-medium text-primaryColor">Back to login</a>
          </p>
        </div>
      </div>
    </main>

    <!-- Shared footer is injected here by scripts.js -->
    <div id="site-footer"></div>

    <!-- Page-only enhancement: password show/hide toggles -->
    <script>
      document.querySelectorAll("[data-password-toggle]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var input = btn.parentElement.querySelector("input");
          if (!input) return;
          var toText = input.type === "password";
          input.type = toText ? "text" : "password";
          btn.setAttribute("aria-label", toText ? "Hide password" : "Show password");
          btn.classList.toggle("text-primaryDark", toText);
        });
      });
    </script>
  </body>
</html>
