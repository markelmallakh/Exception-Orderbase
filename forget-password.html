<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password — Exception</title>
    <meta
      name="description"
      content="Reset access to your Exception account. Enter your email or phone and verify with the code we send you."
    />
    <!-- Tailwind (Play CDN) + faithful port of the project's tailwind.config.ts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tw-config.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script defer src="scripts.js"></script>
  </head>
  <body data-page="forget" data-path="/forget-password" class="antialiased bg-white">
    <!-- Shared header is injected here by scripts.js -->
    <div id="site-header"></div>

    <main class="overflow-x-hidden">
      <!-- ============================ AUTH: FORGOT PASSWORD ============================ -->
      <!-- Combines ForgetPasswordForm.tsx (email step) + OtpVerificationForm.tsx (OTP step), stacked. -->
      <div class="py-6 md:py-12">
        <!-- ── Step 1: request a verification code (ForgetPasswordForm) ── -->
        <div class="rounded-[20px] bg-white px-5 py-6 border border-gray-300 md:px-8 mx-auto mt-10 w-[90%] md:mt-20 md:max-w-[570px]">
          <h1 class="w-full border-b border-primaryLight pb-5 text-center text-2xl font-medium text-primaryDark">Forgot Password</h1>
          <p class="mt-6 text-center text-sm text-blackText">Enter the email or phone number linked to your account and we'll send you a 6-digit verification code.</p>

          <!-- Demo form: prevented + toasts on submit (see scripts.js data-demo-form) -->
          <form data-demo-form="Verification code sent to your email" data-reset="false" class="m-auto my-10 flex flex-col gap-6">
            <div class="flex flex-col gap-y-2">
              <label for="fp-email" class="after:ps-1 text-gray-700 after:content-['*']">Email or phone</label>
              <input type="text" id="fp-email" name="email" placeholder="you@example.com or +20 10 1234 5678" class="h-11 px-2.5 py-4 border border-primaryText focus:border-primary-400 rounded-md text-textSecondary transition-colors text-sm font-medium outline-none" />
            </div>
            <button type="submit" class="btn btn--black btn--md w-full justify-center focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primaryDark">Send code</button>
          </form>
        </div>

        <!-- ── Step 2: enter the OTP (OtpVerificationForm / InputOTPGroup) ── -->
        <div class="rounded-[20px] bg-white px-5 py-6 border border-gray-300 md:px-8 mx-auto mt-8 w-[90%] max-w-[616px] flex flex-col gap-8 md:mt-10">
          <p class="text-center text-blackText">We've sent a 6-digit verification code to your email. Enter it below to continue.</p>

          <!-- Demo form: prevented + toasts on submit (see scripts.js data-demo-form) -->
          <form data-demo-form="Code verified — reset your password" data-redirect="reset-password.html" data-reset="false" class="flex flex-col gap-8">
            <div>
              <label class="mx-auto mb-2 block text-center text-sm text-blackText">Enter OTP</label>
              <div data-otp class="flex items-center justify-center gap-2 md:gap-4">
                <input type="tel" inputmode="numeric" maxlength="1" aria-label="OTP digit 1" class="w-12 h-12 md:w-14 md:h-14 aspect-square rounded-lg border border-gray-300 p-2.5 text-center text-lg font-semibold text-textSecondary outline-none focus:border-primaryColor" />
                <input type="tel" inputmode="numeric" maxlength="1" aria-label="OTP digit 2" class="w-12 h-12 md:w-14 md:h-14 aspect-square rounded-lg border border-gray-300 p-2.5 text-center text-lg font-semibold text-textSecondary outline-none focus:border-primaryColor" />
                <input type="tel" inputmode="numeric" maxlength="1" aria-label="OTP digit 3" class="w-12 h-12 md:w-14 md:h-14 aspect-square rounded-lg border border-gray-300 p-2.5 text-center text-lg font-semibold text-textSecondary outline-none focus:border-primaryColor" />
                <input type="tel" inputmode="numeric" maxlength="1" aria-label="OTP digit 4" class="w-12 h-12 md:w-14 md:h-14 aspect-square rounded-lg border border-gray-300 p-2.5 text-center text-lg font-semibold text-textSecondary outline-none focus:border-primaryColor" />
                <input type="tel" inputmode="numeric" maxlength="1" aria-label="OTP digit 5" class="w-12 h-12 md:w-14 md:h-14 aspect-square rounded-lg border border-gray-300 p-2.5 text-center text-lg font-semibold text-textSecondary outline-none focus:border-primaryColor" />
                <input type="tel" inputmode="numeric" maxlength="1" aria-label="OTP digit 6" class="w-12 h-12 md:w-14 md:h-14 aspect-square rounded-lg border border-gray-300 p-2.5 text-center text-lg font-semibold text-textSecondary outline-none focus:border-primaryColor" />
              </div>
            </div>
            <button type="submit" class="btn btn--black btn--md w-full justify-center focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primaryDark">Verify</button>
          </form>

          <div class="flex justify-center">
            <button type="button" class="btn btn--primary btn--sm" onclick="window.kToast &amp;&amp; window.kToast('A new code has been sent')">Resend code</button>
          </div>

          <a href="reset-password.html" class="mx-auto flex items-center gap-2 text-sm font-medium text-primaryDark underline">
            <span>Continue to reset password</span>
            <svg width="18" height="12" viewBox="0 0 19 12" fill="none" class="shrink-0"><path d="M13.5 1L18 6M18 6L13.5 11M18 6H0" stroke="currentColor" stroke-width="1.5" /></svg>
          </a>
        </div>

        <p class="mx-auto mt-8 w-[90%] max-w-[616px] text-center text-sm text-primaryText">
          Remember your password?
          <a href="login.html" class="pb-0.5 border-primaryColor border-b font-medium text-primaryColor">Back to login</a>
        </p>
      </div>
    </main>

    <!-- Shared footer is injected here by scripts.js -->
    <div id="site-footer"></div>

    <!-- Page-only enhancement: OTP auto-advance / backspace / paste (mirrors InputOTPGroup) -->
    <script>
      (function () {
        var boxes = Array.prototype.slice.call(document.querySelectorAll("[data-otp] input"));
        boxes.forEach(function (box, i) {
          box.addEventListener("input", function () {
            box.value = box.value.replace(/\D/g, "").slice(0, 1);
            if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
          });
          box.addEventListener("keydown", function (e) {
            if (e.key === "Backspace" && !box.value && i > 0) boxes[i - 1].focus();
          });
          box.addEventListener("paste", function (e) {
            e.preventDefault();
            var data = ((e.clipboardData || window.clipboardData).getData("text") || "").replace(/\D/g, "").slice(0, boxes.length);
            data.split("").forEach(function (ch, k) {
              if (boxes[k]) boxes[k].value = ch;
            });
            var next = Math.min(data.length, boxes.length - 1);
            if (boxes[next]) boxes[next].focus();
          });
        });
      })();
    </script>
  </body>
</html>
