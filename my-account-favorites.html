<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Favorites — Exception</title>
    <meta name="description" content="Your saved favorite cakes, oriental sweets and chocolate at Exception." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tw-config.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script defer src="scripts.js"></script>
  </head>
  <body data-page="account" data-path="/my-account/favorites" class="antialiased bg-white">
    <!-- Shared header is injected here by scripts.js -->
    <div id="site-header"></div>

    <main class="overflow-x-hidden">
      <!-- Account layout: two-column grid (sidebar collapses above content on mobile) -->
      <div class="flex lg:flex-row flex-col items-start gap-7 md:gap-10 mx-auto px-4 py-10 md:py-20 max-w-[1392px]">
        <!-- ============================ ACCOUNT SIDEBAR ============================ -->
        <aside class="w-full lg:w-[25%] lg:min-h-[520px] shrink-0">
          <div class="rounded-[20px] border border-gray-300 bg-white p-5 md:p-6 lg:pt-6">
            <div class="flex items-center gap-4 lg:flex-col lg:items-start border-b border-gray-200 pb-5">
              <div class="flex h-16 w-16 shrink-0 items-center justify-center rounded-full bg-primary-light text-xl font-semibold text-primaryDark">MH</div>
              <div class="flex flex-col gap-1.5">
                <span class="flex w-fit items-center gap-1.5 rounded-md bg-accent-900 px-3 py-1 text-xs font-semibold capitalize text-accent-100">
                  <svg viewBox="0 0 24 24" fill="currentColor" class="h-3.5 w-3.5"><path d="m12 2 2.9 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77 5.82 21l1.18-6.86-5-4.87 7.1-1.01L12 2Z"/></svg>
                  Gold
                </span>
                <h3 class="text-lg font-medium text-primaryDark md:text-2xl">Mariam Hassan</h3>
              </div>
            </div>
            <ul class="space-y-2.5 pt-5">
              <li><a href="my-account.html" class="flex items-center gap-3 md:gap-5 rounded-lg px-4 xl:px-7 py-2.5 transition-all duration-200 text-gray-700 hover:bg-primary-light"><span class="inline-block w-5 md:w-6"><svg viewBox="0 0 24 24" fill="none" class="w-full"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></span><span class="font-semibold text-sm md:text-base whitespace-nowrap">Dashboard</span></a></li>
              <li><a href="my-account-profile.html" class="flex items-center gap-3 md:gap-5 rounded-lg px-4 xl:px-7 py-2.5 transition-all duration-200 text-gray-700 hover:bg-primary-light"><span class="inline-block w-5 md:w-6"><svg viewBox="0 0 24 24" fill="none" class="w-full"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M4 21a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span><span class="font-semibold text-sm md:text-base whitespace-nowrap">Profile</span></a></li>
              <li><a href="my-account-orders.html" class="flex items-center gap-3 md:gap-5 rounded-lg px-4 xl:px-7 py-2.5 transition-all duration-200 text-gray-700 hover:bg-primary-light"><span class="inline-block w-5 md:w-6"><svg viewBox="0 0 24 24" fill="none" class="w-full"><path d="M21 8 12 3 3 8v8l9 5 9-5V8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="m3 8 9 5 9-5M12 13v8" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></span><span class="font-semibold text-sm md:text-base whitespace-nowrap">Orders</span></a></li>
              <li><a href="my-account-addresses.html" class="flex items-center gap-3 md:gap-5 rounded-lg px-4 xl:px-7 py-2.5 transition-all duration-200 text-gray-700 hover:bg-primary-light"><span class="inline-block w-5 md:w-6"><svg viewBox="0 0 24 24" fill="none" class="w-full"><path d="M3 10.5 12 3l9 7.5M5.5 9v11h13V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="font-semibold text-sm md:text-base whitespace-nowrap">Addresses</span></a></li>
              <li><a href="my-account-favorites.html" aria-current="page" class="flex items-center gap-3 md:gap-5 rounded-lg px-4 xl:px-7 py-2.5 transition-all duration-200 bg-primary-light text-primaryDark"><span class="inline-block w-5 md:w-6"><svg viewBox="0 0 24 24" fill="none" class="w-full"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z" stroke="currentColor" stroke-width="1.6"/></svg></span><span class="font-semibold text-sm md:text-base whitespace-nowrap">Favorites</span></a></li>
              <li><a href="my-account-wallet.html" class="flex items-center gap-3 md:gap-5 rounded-lg px-4 xl:px-7 py-2.5 transition-all duration-200 text-gray-700 hover:bg-primary-light"><span class="inline-block w-5 md:w-6"><svg viewBox="0 0 24 24" fill="none" class="w-full"><path d="M3 7a2 2 0 0 1 2-2h12v4M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3M21 11h-5a2 2 0 0 0 0 4h5V9a2 2 0 0 0-2-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="font-semibold text-sm md:text-base whitespace-nowrap">Wallet</span></a></li>
              <li><a href="my-account-point.html" class="flex items-center gap-3 md:gap-5 rounded-lg px-4 xl:px-7 py-2.5 transition-all duration-200 text-gray-700 hover:bg-primary-light"><span class="inline-block w-5 md:w-6"><img src="images/pointwallet.png" alt="Points" class="w-full object-contain" /></span><span class="font-semibold text-sm md:text-base whitespace-nowrap">Points</span></a></li>
            </ul>
            <div class="mt-6 border-t border-gray-200 px-1 py-6">
              <h4 class="mb-3 font-semibold text-neutral-support-bg md:text-lg">Need help?</h4>
              <ul class="flex flex-col gap-4">
                <li><a href="faqs.html" class="font-medium text-primaryColor text-sm md:text-base hover:underline">FAQs</a></li>
                <li><a href="contact-us.html" class="font-medium text-primaryColor text-sm md:text-base hover:underline">Contact us</a></li>
              </ul>
              <a href="login.html" class="mt-4 inline-block font-medium text-gray-700 text-sm hover:underline">Logout</a>
            </div>
          </div>
        </aside>

        <!-- ============================ ACCOUNT CONTENT ============================ -->
        <div class="w-full lg:w-[calc(75%-36px)]">
          <nav class="mb-6 flex items-center gap-2 text-sm text-gray-700" aria-label="Breadcrumb">
            <a href="my-account.html" class="hover:text-primaryDark">My account</a>
            <span>/</span>
            <span class="font-medium text-textSecondary">Favorites</span>
          </nav>

          <div class="flex flex-col gap-7 md:gap-10">
            <!-- Page header -->
            <div class="flex flex-wrap items-center justify-between gap-4">
              <div class="flex items-center gap-2.5">
                <h1 class="text-[28px] font-semibold capitalize leading-[50px] text-textSecondary">My Favorites</h1>
              </div>
            </div>

            <!-- Empty state (when there are no favorites yet):
                 show the message "You have no favorites yet" followed by a "Shop now" button linking to shop.html. -->

            <!-- Favorites grid — canonical product card (favorited: filled heart) -->
            <div id="favorites-grid" class="grid gap-x-2.5 gap-y-7 md:gap-x-5 md:gap-y-10 grid-cols-2 md:grid-cols-3"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Shared footer is injected here by scripts.js -->
    <div id="site-footer"></div>

    <!-- Favorited products → rendered as canonical product cards with a filled (active) wishlist heart -->
    <script>
      (function () {
        const IMGS = [
          "dummy-images/image-7.webp",
          "dummy-images/image-2.webp",
          "images/singleproduct.png",
          "dummy-images/image-8.webp",
          "images/secondmemoryimage.png",
          "images/saleimage.png",
        ];
        // [name, price, saleOriginal(0 = no sale)]
        const DATA = [
          ["Chocolate Fudge Cake", 650, 0],
          ["Assorted Baklava Box", 420, 480],
          ["Belgian Truffle Selection", 380, 0],
          ["Red Velvet Gateau", 590, 0],
          ["Pistachio Kunafa", 260, 0],
          ["Dark Chocolate Gift Box", 500, 560],
        ];
        function card([name, price, sale], i) {
          const cur = sale ? Math.min(price, sale) : price;
          const old = sale ? Math.max(price, sale) : 0;
          const hasSale = sale && old > cur;
          const intp = Math.floor(cur);
          const dec = (cur - intp).toFixed(2).substring(1);
          return `
          <a href="product.html" class="group/card block relative" aria-label="${name}">
            <div class="relative">
              <div class="rounded-[12px] aspect-square overflow-hidden bg-primary-light">
                <img src="${IMGS[i % IMGS.length]}" alt="${name}" class="w-full h-full object-cover md:group-hover/card:scale-110 transition-all duration-300" />
              </div>
              <span class="absolute end-3 -bottom-5 z-10" data-add-widget data-type="simple">
                <button type="button" data-add-btn aria-label="Add to cart" class="grid place-items-center bg-primary-200 text-primaryDark rounded-[8px] size-[42px] shadow-custom-5 hover:bg-primary-300 transition-colors">
                  <svg viewBox="0 0 24 24" fill="none" class="w-[22px] h-[22px]"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
                </button>
                <span class="hidden items-center gap-0.5 bg-primary-light rounded-[8px] h-[42px] px-2 shadow-custom-5" data-counter>
                  <button type="button" data-dec aria-label="Remove" class="grid place-items-center size-[26px] rounded-[4px] hover:bg-black/5 transition-colors">
                    <img data-dec-icon src="images/icons/trash.svg" alt="" width="18" height="18" />
                  </button>
                  <span data-qty class="w-[34px] text-center text-lg font-medium text-primaryDark tabular-nums">1</span>
                  <button type="button" data-inc aria-label="Add" class="grid place-items-center size-[26px] rounded-[4px] bg-primary-300 text-white hover:bg-primary-400 transition-colors">
                    <svg viewBox="0 0 24 24" fill="none" class="w-4 h-4"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
                  </button>
                </span>
              </span>
            </div>
            <div class="flex flex-col gap-2 pt-6">
              <div class="flex items-end gap-2 flex-wrap">
                <span class="flex items-end gap-0.5 text-cta leading-none" dir="ltr">
                  <span class="text-2xl font-semibold">${intp}</span>
                  <span class="text-lg font-normal">${dec}</span>
                  <span class="text-lg font-normal">EGP</span>
                </span>
                ${hasSale ? `<span class="text-sm text-gray-500 line-through leading-none" dir="ltr">${old}.00EGP</span>` : ""}
              </div>
              <p class="text-primaryDark text-base font-medium leading-[1.4] line-clamp-2 min-h-[2.8em]">${name}</p>
            </div>
          </a>`;
        }
        const grid = document.getElementById("favorites-grid");
        if (grid) grid.innerHTML = DATA.map(card).join("");
      })();
    </script>
  </body>
</html>
